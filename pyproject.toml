[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests that hit external APIs (yfinance, FRED)",
]
addopts = "--cov=. --cov-report=term-missing --cov-report=html:output/coverage -q"

[tool.coverage.run]
omit = [
    "tests/*",
    "examples/*",
    "dashboard/app.py",
    "dashboard/auth.py",
    "dashboard/middleware.py",
    "dashboard/telemetry.py",
    "dashboard/reporting.py",
    "dashboard/analysis.py",
    "dashboard/callbacks.py",
    "output/*",
    ".venv/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
